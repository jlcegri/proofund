specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CampaignFactory
    network: sepolia
    source:
      address: "0x1971f060774B1974090ed8EF48E35D53a7D5003e"
      abi: CampaignFactory
      startBlock: 11048384
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CampaignCreated
      abis:
        - name: CampaignFactory
          file: ./abis/CampaignFactory.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,uint256,uint256,string)
          handler: handleCampaignCreated
      file: ./src/campaign-factory.ts
